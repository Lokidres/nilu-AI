<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nilu AI — Yusuf'tan Nilüfer'e</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0608;
      --surface: #130d10;
      --card: #1c1318;
      --border: rgba(220, 160, 140, 0.12);
      --rose: #e8a89c;
      --rose-bright: #f0c4bb;
      --rose-dim: rgba(232, 168, 156, 0.4);
      --gold: #c9a96e;
      --gold-dim: rgba(201, 169, 110, 0.3);
      --text: #f0e8e6;
      --text-muted: rgba(240, 232, 230, 0.5);
      --text-faint: rgba(240, 232, 230, 0.25);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(180, 60, 80, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(140, 50, 100, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(201, 169, 110, 0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating petals */
    .petal {
      position: fixed;
      width: 6px;
      height: 10px;
      border-radius: 50% 0 50% 0;
      background: linear-gradient(135deg, rgba(232, 168, 156, 0.3), rgba(201, 169, 110, 0.15));
      animation: floatPetal linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes floatPetal {
      0% {
        transform: translateY(-20px) rotate(0deg) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 0.6;
      }

      100% {
        transform: translateY(110vh) rotate(720deg) translateX(40px);
        opacity: 0;
      }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* Header */
    header {
      padding: 28px 32px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .logo-ring {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid var(--rose-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 4px;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(232, 168, 156, 0.2), transparent);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    .logo-icon {
      font-size: 22px;
    }

    .logo-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--rose-bright);
    }

    .logo-sub {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), var(--gold-dim), var(--border), transparent);
      margin-top: 20px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 3px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: var(--rose-dim);
      border-radius: 2px;
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 32px 20px;
      animation: fadeUp 0.8s ease both;
    }

    .welcome-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-style: italic;
      font-weight: 300;
      color: var(--rose);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .welcome-hint {
      font-size: 12px;
      color: var(--text-faint);
      letter-spacing: 0.08em;
    }

    /* Message bubbles */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .msg-avatar {
      background: linear-gradient(135deg, rgba(232, 168, 156, 0.2), rgba(201, 169, 110, 0.15));
      border: 1px solid var(--rose-dim);
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, rgba(201, 169, 110, 0.15), rgba(180, 60, 80, 0.1));
      border: 1px solid var(--gold-dim);
    }

    .msg-bubble {
      max-width: 72%;
      padding: 14px 18px;
      border-radius: 2px;
      line-height: 1.7;
      font-size: 14.5px;
    }

    .msg.user .msg-bubble {
      background: rgba(232, 168, 156, 0.08);
      border: 1px solid rgba(232, 168, 156, 0.15);
      color: var(--text);
      border-radius: 12px 2px 12px 12px;
    }

    .msg.ai .msg-bubble {
      background: rgba(201, 169, 110, 0.06);
      border: 1px solid rgba(201, 169, 110, 0.12);
      color: var(--text);
      border-radius: 2px 12px 12px 12px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 400;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 6px 0;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--rose);
      animation: blink 1.2s ease infinite;
    }

    .typing-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: 0.2;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Input */
    .input-wrap {
      padding: 20px 32px 28px;
      flex-shrink: 0;
    }

    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      transition: border-color 0.3s;
    }

    .input-bar:focus-within {
      border-color: rgba(232, 168, 156, 0.35);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      resize: none;
      max-height: 120px;
      line-height: 1.6;
      min-height: 22px;
    }

    textarea::placeholder {
      color: var(--text-faint);
    }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--rose-dim);
      background: transparent;
      color: var(--rose);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: rgba(232, 168, 156, 0.1);
      border-color: var(--rose);
      transform: scale(1.05);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn svg {
      width: 15px;
      height: 15px;
    }

    .footer-note {
      text-align: center;
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 0.1em;
      margin-top: 10px;
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .sug-chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(232, 168, 156, 0.04);
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .sug-chip:hover {
      border-color: var(--rose-dim);
      color: var(--rose-bright);
      background: rgba(232, 168, 156, 0.08);
    }
  </style>
</head>

<body>

  <!-- Floating petals -->
  <div id="petals"></div>

  <div class="app">
    <header>
      <div class="logo-ring">
        <span class="logo-icon">✦</span>
      </div>
      <div class="logo-title">Nilu AI</div>
      <div class="logo-sub">Yusuftan askıma Nilufere</div>
      <div class="divider"></div>
    </header>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-quote">"slmaskım senicok seviyom"</div>
        <div class="welcome-hint">— Nilu AI'a bir soru sor.</div>
        <div class="suggestions">
          <div class="sug-chip" onclick="sendSuggestion('2+2 kaçtır?')">2+2 kaçtır?</div>
          <div class="sug-chip" onclick="sendSuggestion('Evren ne kadar büyük?')">Evren ne kadar büyük?</div>
          <div class="sug-chip" onclick="sendSuggestion('Mutluluğun sırrı nedir?')">Mutluluğun sırrı nedir?</div>
          <div class="sug-chip" onclick="sendSuggestion('Türkiye\'nin başkenti neresi?')">Türkiye'nin başkenti neresi?
          </div>
        </div>
      </div>
    </div>

    <div class="input-wrap">
      <div class="input-bar">
        <textarea id="input" placeholder="Bir şey sor..." rows="1" onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
        </button>
      </div>
      <div class="footer-note">Nilu AI · Yusuf'un kalbinden doğdu ✦</div>
    </div>
  </div>

  <script>
    // Floating petals
    const petalContainer = document.getElementById('petals');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (12 + Math.random() * 18) + 's';
      p.style.animationDelay = (Math.random() * 15) + 's';
      p.style.width = (4 + Math.random() * 6) + 'px';
      p.style.height = (6 + Math.random() * 8) + 'px';
      p.style.opacity = 0.3 + Math.random() * 0.4;
      petalContainer.appendChild(p);
    }

    let history = [];

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendSuggestion(text) {
      document.getElementById('input').value = text;
      sendMessage();
    }

    function addMsg(role, text) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? '◌' : '✦';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      div.appendChild(avatar);
      div.appendChild(bubble);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ai';
      div.id = 'typing-indicator';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '✦';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

      div.appendChild(avatar);
      div.appendChild(bubble);
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing-indicator');
      if (t) t.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';

      addMsg('user', text);
      addTyping();

      history.push({ role: 'user', content: text });

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, history: history.slice(-10) })
        });

        const data = await res.json();
        removeTyping();

        const reply = data.reply || 'Bir hata oluştu.';
        addMsg('ai', reply);
        history.push({ role: 'assistant', content: reply });

      } catch (err) {
        removeTyping();
        addMsg('ai', 'Bağlantı kurulamadı. Lütfen tekrar dene. ✦');
      }
    }
  </script>
</body>

</html>
